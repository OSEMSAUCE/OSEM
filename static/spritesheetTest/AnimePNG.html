<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #888; display: flex; flex-direction: column; 
           align-items: center; justify-content: center; height: 100vh; margin: 0; }

    #sprite {
      width: 128px;
      height: 256px;
      background-repeat: no-repeat;
      background-size: calc(128px * 12) calc(256px * 2);
      border: 2px dashed #fff;
    }

    #dropzone { color: white; margin-bottom: 20px; font-family: sans-serif; }
  </style>
</head>
<body>
  <p id="dropzone">👆 Drag your spritesheet onto the character box</p>
  <div id="sprite"></div>

  <script>
    const sprite = document.getElementById('sprite');
    const COLS = 12, ROWS = 2, TOTAL = COLS * ROWS;
    const FRAME_W = 128, FRAME_H = 256;
    let frame = 0;

    // Drag and drop your PNG right onto the box
    sprite.addEventListener('dragover', e => e.preventDefault());
    sprite.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      const url = URL.createObjectURL(file);
      sprite.style.backgroundImage = `url('${url}')`;
    });

    setInterval(() => {
      const col = frame % COLS;
      const row = Math.floor(frame / COLS);
      sprite.style.backgroundPosition = `${-(col * FRAME_W)}px ${-(row * FRAME_H)}px`;
      frame = (frame + 1) % TOTAL;
    }, 1000 / 12);
  </script>
</body>
</html>
